<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3efe7" />
    <title>Autonomy Hub Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script type="module" src="/static/dashboard.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#dashboard-main">Saltar al workspace operativo</a>

    <main id="dashboard-main" class="dashboard-page">
      <section id="status-banner" class="status-banner" hidden></section>
      <p id="status-live-region" class="sr-only" aria-live="polite" aria-atomic="true"></p>

      <div class="dashboard-shell">
        <aside class="mission-rail" aria-labelledby="mission-queue-title">
          <div id="mission-queue"></div>
        </aside>

        <section id="mission-workspace" class="mission-workspace" aria-labelledby="workspace-heading">
          <header id="dashboard-header" class="workspace-header"></header>

          <div class="workspace-frame">
            <nav id="workspace-tabs" class="workspace-tabs" aria-label="Secciones del workspace"></nav>

            <section
              id="workspace-panel-runtime"
              class="workspace-panel"
              role="tabpanel"
              aria-labelledby="workspace-tab-runtime"
            ></section>
            <section
              id="workspace-panel-logs"
              class="workspace-panel"
              role="tabpanel"
              aria-labelledby="workspace-tab-logs"
            ></section>
            <section
              id="workspace-panel-graph"
              class="workspace-panel"
              role="tabpanel"
              aria-labelledby="workspace-tab-graph"
            ></section>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
